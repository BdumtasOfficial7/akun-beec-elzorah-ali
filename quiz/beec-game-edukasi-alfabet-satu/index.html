<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alphabet Adventure</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#4facfe,#00f2fe);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:15px;
overflow:hidden;
}

.container{
width:100%;
max-width:700px;
background:white;
border-radius:30px;
padding:20px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.dino{
font-size:80px;
animation:bounce 1s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

h1{
color:#ff4081;
margin-bottom:10px;
}

#progressText{
font-size:22px;
font-weight:bold;
margin-bottom:10px;
color:#2196f3;
}

.progress{
width:100%;
height:20px;
background:#ddd;
border-radius:20px;
overflow:hidden;
margin-bottom:15px;
}

.progressFill{
height:100%;
width:0%;
background:#4caf50;
transition:.5s;
}

#instruction{
font-size:40px;
font-weight:bold;
color:#ff5722;
margin:10px 0;
}

#word{
font-size:28px;
margin-bottom:15px;
}

#speakBtn{
padding:10px 20px;
border:none;
background:#2196f3;
color:white;
border-radius:15px;
font-size:18px;
margin-bottom:20px;
cursor:pointer;
}

.choices{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.choice{
height:120px;
border:none;
border-radius:25px;
font-size:60px;
font-weight:bold;
color:white;
cursor:pointer;
transition:.3s;
}

.choice:hover{
transform:scale(1.05);
}

.correct{
background:#4caf50 !important;
}

.wrong{
background:#f44336 !important;
}

#message{
font-size:28px;
height:40px;
margin-top:15px;
font-weight:bold;
}

#score{
font-size:24px;
margin-top:15px;
color:#ff9800;
}

#winScreen{
display:none;
}

#winScreen h2{
font-size:50px;
color:#ff4081;
}

.playAgain{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:15px;
background:#ff4081;
color:white;
cursor:pointer;
margin-top:20px;
}

@media(max-width:600px){

#instruction{
font-size:32px;
}

.choice{
height:100px;
font-size:50px;
}

}
</style>
</head>
<body>

<div class="container">

<div class="dino">🦕</div>

<h1>Alphabet Adventure</h1>

<div id="progressText">
Letter A of Z
</div>

<div class="progress">
<div class="progressFill" id="progressFill"></div>
</div>

<div id="gameArea">

<div id="instruction">
Find Letter A
</div>

<div id="word">
🍎 Apple
</div>

<button id="speakBtn">
🔊 Listen Again
</button>

<div class="choices" id="choices"></div>

<div id="message"></div>

<div id="score">
⭐ Score: 0
</div>

</div>

<div id="winScreen">

<h2>🎉 AMAZING! 🎉</h2>

<p>You Finished A-Z!</p>

<p style="font-size:40px;">⭐⭐⭐⭐⭐</p>

<button class="playAgain" onclick="restartGame()">
Play Again
</button>

</div>

</div>

<script>

const alphabet =
"ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

const words = {
A:"🍎 Apple",
B:"⚽ Ball",
C:"🐱 Cat",
D:"🐶 Dog",
E:"🐘 Elephant",
F:"🐟 Fish",
G:"🦒 Giraffe",
H:"🎩 Hat",
I:"🍦 Ice Cream",
J:"🧃 Juice",
K:"🪁 Kite",
L:"🦁 Lion",
M:"🐵 Monkey",
N:"🪺 Nest",
O:"🍊 Orange",
P:"🐷 Pig",
Q:"👑 Queen",
R:"🐰 Rabbit",
S:"☀️ Sun",
T:"🐯 Tiger",
U:"☂️ Umbrella",
V:"🚐 Van",
W:"🐋 Whale",
X:"🎵 Xylophone",
Y:"🦬 Yak",
Z:"🦓 Zebra"
};

let current = 0;
let score = 0;

const choices =
document.getElementById("choices");

const instruction =
document.getElementById("instruction");

const word =
document.getElementById("word");

const message =
document.getElementById("message");

const scoreBox =
document.getElementById("score");

const progressFill =
document.getElementById("progressFill");

const progressText =
document.getElementById("progressText");

function speak(text){

speechSynthesis.cancel();

const speech =
new SpeechSynthesisUtterance(text);

speech.lang="en-US";
speech.rate=0.85;
speech.pitch=1.3;

speechSynthesis.speak(speech);

}

function shuffle(array){

for(let i=array.length-1;i>0;i--){

const j =
Math.floor(Math.random()*(i+1));

[array[i],array[j]] =
[array[j],array[i]];

}

return array;

}

function loadQuestion(){

if(current >= alphabet.length){

showWin();

return;

}

const answer =
alphabet[current];

instruction.innerHTML =
"Find Letter " + answer;

word.innerHTML =
words[answer];

progressText.innerHTML =
"Letter " + answer + " of Z";

progressFill.style.width =
((current)/26*100) + "%";

let options = [answer];

while(options.length < 4){

let random =
alphabet[
Math.floor(Math.random()*26)
];

if(!options.includes(random))
options.push(random);

}

shuffle(options);

choices.innerHTML = "";

const colors = [
"#42a5f5",
"#ab47bc",
"#ff7043",
"#26a69a"
];

options.forEach(letter=>{

let btn =
document.createElement("button");

btn.className = "choice";

btn.style.background =
colors[Math.floor(Math.random()*4)];

btn.innerHTML = letter;

btn.onclick = () =>
checkAnswer(letter,btn);

choices.appendChild(btn);

});

}

function checkAnswer(letter,btn){

const answer =
alphabet[current];

if(letter===answer){

btn.classList.add("correct");

score += 10;

scoreBox.innerHTML =
"⭐ Score: " + score;

message.innerHTML =
"🌟 Great Job!";

speak(
answer +
" is for " +
words[answer]
.replace(/[^\w\s]/g,'')
);

current++;

setTimeout(()=>{

message.innerHTML = "";

loadQuestion();

},1200);

}else{

btn.classList.add("wrong");

message.innerHTML =
"❌ Try Again";

speak("Try Again");

setTimeout(()=>{

btn.classList.remove("wrong");

message.innerHTML = "";

},700);

}

}

document.getElementById("speakBtn")
.onclick = ()=>{

let answer =
alphabet[current];

speak(
answer +
" is for " +
words[answer]
);

};

function showWin(){

document.getElementById("gameArea")
.style.display="none";

document.getElementById("winScreen")
.style.display="block";

progressFill.style.width="100%";

speak(
"Congratulations. You completed the alphabet."
);

}

function restartGame(){

current = 0;
score = 0;

document.getElementById("gameArea")
.style.display="block";

document.getElementById("winScreen")
.style.display="none";

scoreBox.innerHTML =
"⭐ Score: 0";

loadQuestion();

}

loadQuestion();

</script>

</body>
</html>
